services: 
  # 3. Prometheus: Lưu trữ dữ liệu
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: root
    volumes:
      - ./prometheus:/etc/prometheus
      - ./prometheus_data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9090:9090" # Xem dữ liệu thô tại localhost:9090
    networks:
      - global-monitor-net
    
# 4. Grafana: Giao diện hiển thị biểu đồ
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    user: root
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_PASSWORD} # ← Mật khẩu từ .env

    volumes:
      - ./grafana_data:/var/lib/grafana
      # Nạp các file cấu hình tự động (Provisioning)
      - ./grafana/provisioning:/etc/grafana/provisioning
      # Nạp file JSON chứa biểu đồ của bạn
      - ./grafana/dashboards:/etc/grafana/dashboards
    networks:
      - global-monitor-net
    depends_on:
      - prometheus
  
  # --- LOGGING SYSTEM ---
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    networks:
      - global-monitor-net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Đọc log trực tiếp từ Docker Engine
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - global-monitor-net
  
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ./alertmanager:/etc/alertmanager
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - global-monitor-net

networks:
  global-monitor-net:
    external: true

volumes:
  alertmanager_data: 