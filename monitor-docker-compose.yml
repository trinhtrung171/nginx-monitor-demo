services:
  # Opentelemetry Collector: Nhận OTLP metric từ backend, expose Prometheus endpoint
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./otel-collector/otel-collector.yml:/etc/otel-collector.yml
    ports:
      - "4318:4318"   # OTLP HTTP receiver (cho backend gửi metric)
      - "8889:8889"   # Prometheus metrics endpoint (cho Prometheus scrape)
    networks:
      - global-monitor-net
    restart: unless-stopped

  # Node Exporter: Collect system metrics (CPU, RAM, disk) from the host
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - global-monitor-net
    restart: unless-stopped

  # 3. Prometheus: Lưu trữ dữ liệu
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: root
    environment:
      - VERCEL_URL=${VERCEL_URL}
    volumes:
      - ./prometheus:/etc/prometheus
      - ./prometheus_data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9090:9090" # Xem dữ liệu thô tại localhost:9090
    networks:
      - global-monitor-net
    restart: unless-stopped
    
# 4. Grafana: Giao diện hiển thị biểu đồ
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    user: root
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_PASSWORD} # ← Mật khẩu từ .env

    volumes:
      - ./grafana_data:/var/lib/grafana
      # Nạp các file cấu hình tự động (Provisioning)
      - ./grafana/provisioning:/etc/grafana/provisioning
      # Nạp file JSON chứa biểu đồ của bạn
      - ./grafana/dashboards:/etc/grafana/dashboards
    networks:
      - global-monitor-net
    depends_on:
      - prometheus
    restart: unless-stopped
  
  # --- LOGGING SYSTEM ---
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki_data:/loki
    networks:
      - global-monitor-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Đọc log trực tiếp từ Docker Engine
      - ./nginx_logs:/var/log/nginx:ro # Mount nginx logs for parsing JSON access logs
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - global-monitor-net
    restart: unless-stopped

  
  # Blackbox exporter: probe external HTTP/HTTPS endpoints (e.g., Vercel apps)
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    ports:
      - "9115:9115"
    networks:
      - global-monitor-net
    restart: unless-stopped
  
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    environment:
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_TO=${SMTP_TO}
    volumes:
      - ./alertmanager:/etc/alertmanager
      - ./alertmanager/entrypoint.sh:/entrypoint.sh:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - global-monitor-net
    restart: unless-stopped

networks:
  global-monitor-net:
    external: true

volumes:
  alertmanager_data: