server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
      - source_labels: ['__meta_docker_container_name']
        regex: '^/(.+)'
        replacement: '${1}'
        target_label: 'service_name'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_id']
        regex: '(.{12})'
        replacement: '${1}'
        target_label: 'container_id'
    pipeline_stages:
      # Decode Docker log format (extract log content from JSON envelope)
      - docker: {}
      
      # Parse JSON log lines from backend
      - json:
          expressions:
            timestamp: timestamp
            ip: ip
            user_id: user_id
            username: username
            method: method
            path: path
            status: status
            duration_ms: duration_ms
            bytes_sent: bytes_sent
            user_agent: user_agent
            type: type
      
      # Map extracted fields to Loki labels for querying
      - labels:
          ip:
          user_id:
          username:
          method:
          status:
          type:

  # Scrape nginx JSON access logs from mounted volume
  - job_name: nginx_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          __path__: /var/log/nginx/*.log
    pipeline_stages:
      # Parse JSON log lines from nginx
      - json:
          expressions:
            timestamp: timestamp
            ip: ip
            method: method
            path: path
            status: status
            duration_ms: duration_ms
            bytes_sent: bytes_sent
            user_agent: user_agent
            http_version: http_version
            upstream_addr: upstream_addr
      
      # Map extracted fields to Loki labels
      - labels:
          ip:
          method:
          status:
          job:

