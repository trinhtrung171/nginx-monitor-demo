name: Docker CI/CD Pipeline

on:
  push:
    # Nhánh nào commit thì nhánh đó chạy, các nhánh khác đứng im
    branches: [ "**" ] 
    # Bỏ qua khi chỉ sửa tài liệu, tránh tốn thời gian
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Cho phép bấm nút chạy tay trên giao diện GitHub

# Tự động hủy lượt chạy cũ nếu bạn push commit mới liên tục trên cùng một nhánh
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/nginx-monitor
  # IMAGE_TAG dùng SHA để định danh duy nhất cho mỗi lần commit
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # --- GIAI ĐOẠN 1: SOI LỖI (Chạy trên mọi nhánh) ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Nginx configuration
        run: docker run --rm -v ${{ github.workspace }}/nginx.conf:/etc/nginx/nginx.conf:ro nginx:alpine nginx -t

      - name: Lint Prometheus & Alert Rules
        run: |
          # 1. Kiểm tra file cấu hình chính (prometheus.yml)
          docker run --rm \
            -v ${{ github.workspace }}/prometheus.yml:/etc/prometheus/prometheus.yml \
            --entrypoint "" \
            prom/prometheus:latest /bin/promtool check config /etc/prometheus/prometheus.yml

          # 2. Kiểm tra file luật cảnh báo (alert_rules.yml)
          docker run --rm \
            -v ${{ github.workspace }}/alert_rules.yml:/etc/prometheus/alert_rules.yml \
            --entrypoint "" \
            prom/prometheus:latest /bin/promtool check rules /etc/prometheus/alert_rules.yml

      - name: Lint Promtail configuration
        run: |
          docker run --rm -v ${{ github.workspace }}/promtail-config.yml:/etc/promtail/config.yml grafana/promtail:latest -check-config -config.file=/etc/promtail/config.yml

      - name: Hadolint Action (Check Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # --- GIAI ĐOẠN 2: ĐÓNG GÓI (Build cho mọi nhánh, nhưng chỉ Push trên Main) ---
  build-and-push:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        # Chỉ Login nếu thực sự cần Push (nhánh main)
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # Push = true nếu là nhánh main, ngược lại chỉ Build để test
          push: ${{ github.ref == 'refs/heads/main' }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:${{ env.IMAGE_TAG }}

  # --- GIAI ĐOẠN 3: KIỂM TRA CHẠY THỰC TẾ (Smoke Test) ---
  smoke-test:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare .env for Docker Compose
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
          echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> .env

      - name: Start system
        run: docker compose up -d

      - name: Wait for services (Smart Check)
        run: |
          echo "Waiting for Nginx..."
          timeout 60s bash -c 'until curl -s --fail http://localhost:8080/stub_status; do sleep 2; done'
          
          echo "Waiting for Grafana..."
          timeout 60s bash -c 'until curl -s --fail http://localhost:3000/api/health; do sleep 2; done'
          
          echo "All services are Healthy!"

      - name: Cleanup
        if: always()
        run: docker compose down
