name: Docker CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- JOB 1: CẢNH SÁT SOI LỖI (LINT) ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Soi lỗi Nginx
      - name: Lint Nginx configuration
        run: docker run --rm -v ${{ github.workspace }}/nginx.conf:/etc/nginx/nginx.conf:ro nginx:alpine nginx -t

      # 2. Soi lỗi Prometheus (Dùng promtool có sẵn trong image prometheus)
      - name: Lint Prometheus configuration
        run: |
          docker run --rm -v ${{ github.workspace }}/prometheus.yml:/prometheus.yml prom/promtool:latest check config /prometheus.yml
      # 3. Soi lỗi Dockerfile (Sử dụng Hadolint)
      - name: Hadolint Action
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # --- JOB 2: ĐÓNG GÓI VÀ XUẤT KHO ---
  build-and-push:
    needs: [lint] # QUAN TRỌNG: Chỉ chạy nếu job lint bên trên thành công ✅
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            trinhtrung175/nginx-monitor:latest
            trinhtrung175/nginx-monitor:${{ github.sha }}