name: Docker CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- ĐÂY LÀ BƯỚC QUAN TRỌNG CẦN THÊM ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # ---------------------------------------

      - name: Validate Nginx configuration
        run: docker run --rm -v ${{ github.workspace }}/nginx.conf:/etc/nginx/nginx.conf:ro nginx:alpine nginx -t

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Giờ đây Cache sẽ hoạt động ngon lành nhờ Buildx
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.trinhtrung175 }}/nginx-monitor:latest
            ${{ secrets.trinhtrung175 }}/nginx-monitor:${{ github.sha }}

      - name: Success Message
        run: echo "Done"