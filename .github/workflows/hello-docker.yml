name: Docker CI/CD Pipeline

on:
  push:
    branches: [ "**" ] # Chạy quy trình trên mọi nhánh để phát hiện lỗi sớm

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- JOB 1: SOI LỖI (LINT) - CHẠY TRÊN MỌI NHÁNH ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Soi lỗi Nginx
      - name: Lint Nginx configuration
        run: docker run --rm -v ${{ github.workspace }}/nginx.conf:/etc/nginx/nginx.conf:ro nginx:alpine nginx -t

      # 2. Soi lỗi Prometheus (Dùng chính image Prometheus nhưng ghi đè entrypoint)
      - name: Lint Prometheus configuration
        run: |
          docker run --rm -v ${{ github.workspace }}/prometheus:/etc/prometheus --entrypoint "" prom/prometheus:latest /bin/promtool check config /etc/prometheus/prometheus.yml
      
      # 3. Soi lỗi Dockerfile (Sử dụng Hadolint)
      - name: Hadolint Action
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # --- JOB 2: ĐÓNG GÓI (VÀ CHỈ XUẤT KHO NẾU LÀ NHÁNH MAIN) ---
  build-and-push:
    needs: [lint] # Chỉ chạy nếu job lint bên trên thành công
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          # ĐIỂM MẤU CHỐT: Chỉ push (đẩy) lên Docker Hub nếu nhánh hiện tại là "main"
          # Các nhánh khác sẽ chỉ thực hiện việc build image để đảm bảo code chạy tốt
          push: ${{ github.ref == 'refs/heads/main' }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-monitor:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-monitor:${{ github.sha }}

  # --- JOB 3: KIỂM TRA SỨC KHỎE (SMOKE TEST) - CHỈ CHẠY TRÊN NHÁNH MAIN ---
  smoke-test:
    needs: [build-and-push] 
    # ĐIỂM MẤU CHỐT: Bỏ qua toàn bộ Job này nếu không phải là nhánh "main"
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Docker network
        run: |
          docker network create global-monitor-net || true

      - name: Start monitoring stack
        run: |
          docker compose -f monitor-docker-compose.yml up -d

      - name: Start application stack
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker compose -f app-docker-compose.yml up -d

      - name: Wait for services to be ready
        run: sleep 60 # Đợi 60 giây để tất cả services khởi động xong

      - name: Check Nginx Health
        run: curl -s --fail http://localhost:8080/stub_status || exit 1

      - name: Check Prometheus Health
        run: curl -s --fail http://localhost:9090/-/healthy || exit 1

      - name: Check Grafana Health
        run: curl -s --fail http://localhost:3000/api/health || exit 1

      - name: Check Alertmanager Health
        run: curl -s --fail http://localhost:9093/-/healthy || exit 1

      - name: Cleanup
        run: |
          docker compose -f app-docker-compose.yml down
          docker compose -f monitor-docker-compose.yml down
          docker network rm global-monitor-net || true