name: Docker CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  # Ép node dùng bản mới nhất để tránh lỗi vặt của GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- JOB 1: SOI LỖI (LINT) ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Soi lỗi Nginx
      - name: Lint Nginx configuration
        run: |
          docker run --rm \
            --add-host my-static-app:127.0.0.1 \
            -v ${{ github.workspace }}/nginx.conf:/etc/nginx/nginx.conf:ro \
            nginx:alpine nginx -t

      # 2. Soi lỗi Prometheus
      - name: Lint Prometheus configuration
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/prometheus.yml:/etc/prometheus/prometheus.yml \
            -v ${{ github.workspace }}/alert_rules.yml:/etc/prometheus/alert_rules.yml \
            --entrypoint "" \
            prom/prometheus:latest /bin/promtool check config /etc/prometheus/prometheus.yml

      # 3. Soi lỗi TOÀN BỘ Dockerfile (Cả gốc và trong folder my-app)
      - name: Hadolint Monitor Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Hadolint App Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: my-app/Dockerfile

  # --- JOB 2: ĐÓNG GÓI VÀ XUẤT KHO (MULTI-ARCH) ---
  build-and-push:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Nginx Monitor (Image 1)
      - name: Build and push Nginx Monitor
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-monitor:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-monitor:${{ github.sha }}
      
      # Build My Static App (Image 2)
      - name: Build and push My Static App
        uses: docker/build-push-action@v5
        with:
          context: ./my-app
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-static-app:latest

  # --- JOB 3: KIỂM TRA SỨC KHỎE (SMOKE TEST) ---
  smoke-test:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start system to test
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker compose up -d

      - name: Wait for services to be ready
        run: sleep 20

      # Check 1: Nginx Monitor endpoint
      - name: Check Nginx Status
        run: curl -s --fail http://localhost:8080/stub_status || exit 1

      # Check 2: THÊM BƯỚC NÀY - Check xem App của bạn có hiện ra không
      - name: Check My Static App content
        run: |
          # Kiểm tra xem trang chủ có trả về mã 200 OK không
          curl -s --fail http://localhost:8080 || exit 1

      # Check 3: Grafana health
      - name: Check Grafana Health
        run: curl -s --fail http://localhost:3000/api/health || exit 1

      - name: Cleanup
        run: docker compose down