name: Docker CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- JOB 1: SOI LỖI (LINT) ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Soi lỗi Nginx
      - name: Lint Nginx configuration
        run: |
          docker run --rm \
            --add-host my-static-app:127.0.0.1 \
            -v ${{ github.workspace }}/nginx.conf:/etc/nginx/nginx.conf:ro \
            nginx:alpine nginx -t

      # 2. Soi lỗi Prometheus (Dùng chính image Prometheus nhưng ghi đè entrypoint)
      - name: Lint Prometheus configuration
        run: |
          docker run --rm -v ${{ github.workspace }}/prometheus.yml:/etc/prometheus/prometheus.yml --entrypoint "" prom/prometheus:latest /bin/promtool check config /etc/prometheus/prometheus.yml
      # 3. Soi lỗi Dockerfile (Sử dụng Hadolint)
      - name: Hadolint Action
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # --- JOB 2: ĐÓNG GÓI VÀ XUẤT KHO ---
  build-and-push:
    needs: [lint] # QUAN TRỌNG: Chỉ chạy nếu job lint bên trên thành công ✅
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-monitor:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-monitor:${{ github.sha }}
      
      - name: Build and push My Static App
        uses: docker/build-push-action@v5
        with:
          context: ./my-app # Trỏ vào đúng thư mục App
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-static-app:latest

  # --- JOB 3: KIỂM TRA SỨC KHỎE (SMOKE TEST) ---
  smoke-test:
    needs: [build-and-push] # Chỉ chạy sau khi đã đẩy image lên kho
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start system to test
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker compose up -d

      - name: Wait for services to be ready
        run: sleep 20 # Đợi 20 giây để Nginx và Grafana khởi động xong

      - name: Check Nginx Health
        run: curl -s --fail http://localhost:8080/stub_status || exit 1

      - name: Check Grafana Health
        run: curl -s --fail http://localhost:3000/api/health || exit 1

      - name: Cleanup
        run: docker compose down