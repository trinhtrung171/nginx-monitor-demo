events {
    worker_connections 1024;
}

# TCP stream proxy for PostgreSQL (secure tunnel from Render/cloud)
stream {
    resolver 127.0.0.11 ipv6=off valid=30s;

    # JSON log format for DB connections
    log_format json_db escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"ip":"$remote_addr",'
            '"port":$remote_port,'
            '"protocol":"$protocol",'
            '"upstream_addr":"$upstream_addr",'
            '"bytes_sent":$bytes_sent,'
            '"bytes_received":$bytes_received,'
            '"session_time":$session_time,'
            '"status":"$status"'
        '}';

    access_log /var/log/nginx/db-access.log json_db;

    server {
        listen 5432;
        set $db_backend devshare-db:5432;
        proxy_pass $db_backend;
        proxy_connect_timeout 10s;
        proxy_timeout 30s;
    }
}

http {
    resolver 127.0.0.11 ipv6=off valid=30s;

    # JSON log format for structured logging to Promtail/Loki
    log_format json_combined escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"ip":"$remote_addr",'
            '"method":"$request_method",'
            '"path":"$uri",'
            '"status":$status,'
            '"duration_ms":$request_time,'
            '"bytes_sent":$bytes_sent,'
            '"user_agent":"$http_user_agent",'
            '"http_version":"$server_protocol",'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_status":"$upstream_status"'
        '}';

    # Global access log using JSON format
    access_log /var/log/nginx/access.log json_combined;

    server {
        listen 80;
        server_name localhost;

        location /stub_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }

        location ~ ^/(posts|subreddits|comments|auth|reports|notifications|access-logs|uploads|upload|api)(/|$) {
            set $backend http://devshare-backend:3001;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
