events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        location / {
            proxy_pass http://my-static-app:80; # Đẩy khách sang container App
            proxy_set_header Host $host;
        }

        location / {
            set $upstream_app my-static-app; # Đặt tên vào biến
            proxy_pass http://$upstream_app:80;
            proxy_set_header Host $host;
            
            # Bạn cần thêm resolver của Docker để Nginx biết tìm ở đâu
            resolver 127.0.0.11 valid=30s; 
        }
        # server_name localhost;

        # # 1. Trang web chính của bạn
        # location / {
