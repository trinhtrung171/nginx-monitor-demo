events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 ipv6=off valid=30s;

    server {
        listen 80;
        server_name localhost;

        # 1. Trang web chính của bạn
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # 2. Proxy uploads to backend
        location /uploads/ {
            set $backend_url http://devshare-backend:3001;
            proxy_pass $backend_url;
            proxy_set_header Host $host;
        }

        # 3. Cửa sổ nhả dữ liệu giám sát (QUAN TRỌNG)
        # Exporter sẽ vào đây để lấy thông số CPU/RAM/Request của Nginx
        location /stub_status {
            stub_status on;
            access_log off;
            allow all; # Trong thực tế nên giới hạn IP, nhưng đồ án thì để all cho dễ
        }
    }
}