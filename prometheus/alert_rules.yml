groups:
  - name: nginx_alerts
    interval: 15s
    rules:
      # Alert 1: Nginx Server Down (Exporter cannot connect to Nginx)
      - alert: NginxServerDown
        expr: |
          up{job="nginx"} == 0 
          OR absent(up{job="nginx"})
          OR nginx_up{job="nginx"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Nginx service is down"
          description: "The Nginx scrape target has disappeared or is down. Check if Nginx container is running."

      # Alert 2: Nginx Request Rate Drop (đột nhiên không có request — có thể NGƯNG HOẠT ĐỘNG)
      - alert: NginxRequestRateDrop
        expr: rate(nginx_http_requests_total[5m]) < 1 AND (rate(nginx_http_requests_total[30m]) - rate(nginx_http_requests_total[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Nginx request rate dropped near zero"
          description: "Request rate is {{ $value | humanize }} req/s. Possible service failure."

      # Alert 3: Nginx High Active Connections (kết nối tồn đọng nhiều)
      - alert: NginxHighConnections
        expr: nginx_connections_active > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Nginx has high active connections"
          description: "Active connections: {{ $value }}"

      # Alert 4: Nginx Connection Drain (tỉ lệ kết nối chờ cao — có thể response chậm)
      - alert: NginxConnectionDrain
        expr: nginx_connections_waiting > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Nginx has many waiting connections"
          description: "Waiting connections: {{ $value }}. Possible slow upstream."